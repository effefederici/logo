<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>M O U S E M U S E U M</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
  }
  canvas {
    display: block;
  }

  /* === ENTER LINK === */
  .enter-link {
    position: fixed;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 28px;
    letter-spacing: 0.4em;
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border: 2px solid #fff;
    transition: all 0.4s ease;
    z-index: 10;
  }

  .enter-link:hover {
    background: #fff;
    color: #000;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<a class="enter-link" 
   href="https://www.researchcatalogue.net/view/4124875/4130104" 
   target="_blank">
   E N T E R
</a>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// canvas offscreen per maschera testuale
const mask = document.createElement("canvas");
const mctx = mask.getContext("2d");

function drawMask() {
  mask.width = canvas.width;
  mask.height = canvas.height;

  mctx.clearRect(0, 0, mask.width, mask.height);
  mctx.fillStyle = "#000";
  mctx.fillRect(0, 0, mask.width, mask.height);

  mctx.fillStyle = "#fff";
  mctx.textAlign = "center";
  mctx.textBaseline = "middle";

  const x = mask.width / 2;
  const y = mask.height / 2;

  const titleSize = 120;
  mctx.font = `bold ${titleSize}px Arial Black, Helvetica, sans-serif`;

  const lineHeight = titleSize * 0.75;

  const mouseWidth = mctx.measureText("MOUSE").width;
  const museumWidth = mctx.measureText("MUSEUM").width;
  const scaleMuseum = mouseWidth / museumWidth;

  mctx.fillText("MOUSE", x, y - lineHeight);

  mctx.save();
  mctx.translate(x, y);
  mctx.scale(scaleMuseum, 1);
  mctx.fillText("MUSEUM", 0, 0);
  mctx.restore();

  const subtitleSize = 42;
  mctx.font = `${subtitleSize}px Arial, Helvetica, sans-serif`;

  const subtitle = "stanzas for potential texts";
  const subtitleWidth = mctx.measureText(subtitle).width;
  const scaleSubtitle = mouseWidth / subtitleWidth;

  const subtitleY = y + lineHeight * 0.85;

  mctx.save();
  mctx.translate(x, subtitleY);
  mctx.scale(scaleSubtitle, 1);
  mctx.fillText(subtitle, 0, 0);
  mctx.restore();

  const copySize = 20;
  mctx.font = `${copySize}px Arial, Helvetica, sans-serif`;

  const copy = "© Federico Federici 2026";
  const copyY = subtitleY + subtitleSize * 1.3;

  mctx.fillText(copy, x, copyY);
}

drawMask();

let frame = 0;

function draw() {
  const img = ctx.createImageData(canvas.width, canvas.height);
  const data = img.data;

  const maskData = mctx.getImageData(0, 0, mask.width, mask.height).data;

  for (let i = 0; i < data.length; i += 4) {
    const mx = maskData[i];
    let v = Math.random() * 255;

    if (mx > 0) {
      v = v * 0.3 + 180 + Math.sin(frame * 0.15 + i) * 50;
    }

    if (Math.random() < 0.015) v = 255;
    if (Math.random() < 0.015) v = 0;

    data[i] = v;
    data[i + 1] = v;
    data[i + 2] = v;
    data[i + 3] = 255;
  }

  ctx.putImageData(img, 0, 0);
  frame++;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
